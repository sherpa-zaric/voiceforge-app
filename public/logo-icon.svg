<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <!-- Left stroke: 3 sound wave curves forming the left side of V -->
  <path d="M8 8 Q16 20, 32 52" stroke="url(#grad)" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M14 6 Q22 20, 32 52" stroke="url(#grad)" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.75"/>
  <path d="M20 4 Q26 20, 32 52" stroke="url(#grad)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Right stroke: solid line forming the right side of V -->
  <path d="M56 8 Q46 24, 32 52" stroke="url(#grad)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
</svg>
